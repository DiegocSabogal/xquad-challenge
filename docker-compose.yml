version: "3.9"

services:
  # -------------------------------------------------------
  # API principal - Pipeline de compliance agéntico
  # -------------------------------------------------------
  compliance-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_MODE=${LLM_MODE:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    networks:
      - compliance-net
    restart: unless-stopped

  # -------------------------------------------------------
  # ChromaDB - Vector store para RAG
  # -------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Langfuse - Observabilidad de LLM (opcional)
  # Comentar si no se requiere observabilidad local
  # -------------------------------------------------------
  langfuse:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@postgres-langfuse:5432/langfuse
      - NEXTAUTH_SECRET=supersecret-change-in-prod
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=supersalt-change-in-prod
    depends_on:
      postgres-langfuse:
        condition: service_healthy
    networks:
      - compliance-net

  postgres-langfuse:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - postgres-langfuse-data:/var/lib/postgresql/data
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chroma-data:
  postgres-langfuse-data:

networks:
  compliance-net:
    driver: bridge
