version: "3.9"

services:
  # -------------------------------------------------------
  # API principal - Pipeline de compliance agéntico
  # -------------------------------------------------------
  compliance-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_MODE=${LLM_MODE:-mock}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    networks:
      - compliance-net
    restart: unless-stopped

  # -------------------------------------------------------
  # ChromaDB - Vector store para RAG
  # -------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - compliance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Langfuse - Observabilidad de LLM
  # Usa Langfuse Cloud (cloud.langfuse.com) — no requiere
  # contenedor local. Configurar LANGFUSE_PUBLIC_KEY,
  # LANGFUSE_SECRET_KEY y LANGFUSE_ENABLED=true en .env
  # -------------------------------------------------------

volumes:
  chroma-data:

networks:
  compliance-net:
    driver: bridge
